# E2E Test Configuration - shared CLI e2e Spark History Server corpus
# Both server entries point at the same SHS instance (served by `task cli:start-shs`) for comparison across servers
servers:
  local:
    default: true
    url: "http://localhost:18080"
  secondary:
    url: "http://localhost:18080"

mcp:
  transports:
    - streamable-http
  port: "18888"
  debug: true
  address: localhost
