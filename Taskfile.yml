version: '3'

output: group

includes:
  k8s:
    taskfile: taskfiles/kind.yaml
    flatten: true
  cli:
    taskfile: skills/cli/Taskfile.yaml
    dir: skills/cli

vars:
  PROJECT_NAME: mcp-apache-spark-history-server
  PYTHON_VERSION: 3.12
  UV_VERSION: '{{.UV_VERSION | default "0.11.23"}}'
  OS: '{{OS}}'
  ARCH: '{{ARCH}}'
  BIN_DIR: .bin
  # Explicit path to the repo-local, pinned uv binary installed by check-uv.
  UV: '{{.ROOT_DIR}}/{{.BIN_DIR}}/uv'

run: once
silent: true

tasks:
  check-uv:
    desc: Install the pinned uv into the repo-local bin dir if missing
    internal: true
    vars:
      UV_ARCH: '{{if eq ARCH "amd64"}}x86_64{{else if eq ARCH "arm64"}}aarch64{{else}}{{ARCH}}{{end}}'
      UV_OS: '{{if eq OS "darwin"}}apple-darwin{{else}}unknown-linux-gnu{{end}}'
      UV_TARGET: 'uv-{{.UV_ARCH}}-{{.UV_OS}}'
    status:
      - test -x "{{.UV}}"
    cmds:
      - |
        if [ ! -x "{{.UV}}" ]; then
          echo "📦 Installing uv {{.UV_VERSION}}..."
          mkdir -p "{{.BIN_DIR}}"
          base="https://github.com/astral-sh/uv/releases/download/{{.UV_VERSION}}"
          tmp="$(mktemp -d)"
          curl -fsSL "$base/{{.UV_TARGET}}.tar.gz"        -o "$tmp/uv.tar.gz"
          curl -fsSL "$base/{{.UV_TARGET}}.tar.gz.sha256" -o "$tmp/uv.tar.gz.sha256"
          # The .sha256 file references the original asset name; verify by our local name.
          ( cd "$tmp" && echo "$(cut -d' ' -f1 uv.tar.gz.sha256)  uv.tar.gz" | shasum -a 256 -c - )
          tar -xzf "$tmp/uv.tar.gz" -C "{{.BIN_DIR}}" --strip-components=1 \
            "{{.UV_TARGET}}/uv" "{{.UV_TARGET}}/uvx"
          rm -rf "$tmp"
          echo "✅ uv installed to {{.BIN_DIR}}/"
        else
          echo "✅ uv is already installed"
        fi

  install:
    desc: Install project dependencies
    deps: [check-uv]
    cmds:
      - "{{.UV}} sync --group dev --frozen"
      - echo "✅ Dependencies installed!"

  lint:
    desc: Run code linting with ruff
    deps: [check-uv]
    cmds:
      - "{{.UV}} run ruff check --fix ."
      - echo "✅ Linting completed!"
      - "{{.UV}} run ruff format ."
      - echo "✅ Code formatted!"

  type-check:
    desc: Run type checking with mypy
    deps: [check-uv]
    cmds:
      - "{{.UV}} run mypy *.py --ignore-missing-imports"
      - echo "✅ Type checking completed!"

  test:
    desc: Run tests with pytest
    deps: [check-uv]
    cmds:
      - "{{.UV}} run pytest --cov=. -cov-report=xml --cov-report=term-missing ."
      - echo "✅ Tests completed!"

  test-helm:
    desc: Run helm chart unit tests
    cmds:
      - helm lint ./deploy/kubernetes/helm/mcp-apache-spark-history-server/
      - helm unittest ./deploy/kubernetes/helm/mcp-apache-spark-history-server/
      - echo "✅ Helm chart unit tests completed!"

  test-e2e:
    desc: Run end-to-end tests against the Spark History Server e2e corpus
    deps: [check-uv]
    cmds:
      - echo "🧪 Starting end-to-end tests..."
      - defer:
          task: stop-all
      - defer:
          task: cli:stop-shs
      - echo "Starting Spark History Server..."
      - task: cli:start-shs
      - echo "Starting MCP server (config tests/config-e2e.yaml)..."
      - task: start-mcp-bg
        vars:
          CONFIG: tests/config-e2e.yaml
      - |
        echo "Running e2e tests..."
        {{.UV}} run pytest tests/e2e.py -v

  security:
    desc: Run security scan with bandit
    deps: [check-uv]
    cmds:
      - "{{.UV}} run bandit -r . --exclude src/spark_history_mcp/api_client -f json -o bandit-report.json"
      - echo "✅ Security scan completed! Check bandit-report.json"

  pre-commit:
    desc: Run all pre-commit checks
    deps: [pre-commit-install]
    cmds:
      - "{{.UV}} run pre-commit run --all-files"
      - echo "✅ Pre-commit checks completed!"

  pre-commit-install:
    desc: Install pre-commit hooks
    internal: true
    deps: [check-uv]
    cmds:
      - "{{.UV}} run pre-commit install"
      - echo "✅ Pre-commit hooks installed!"

  clean:
    desc: Clean build artifacts and cache
    cmds:
      - rm -rf __pycache__/
      - rm -rf .pytest_cache/
      - rm -rf .coverage
      - rm -rf htmlcov/
      - rm -rf .mypy_cache/
      - rm -rf bandit-report.json
      - find . -type f -name "*.pyc" -delete
      - find . -type d -name "__pycache__" -delete
      - echo "✅ Cleanup completed!"

  start-spark:
    desc: Start local Spark History Server for testing
    interactive: true
    vars:
      SPARK_VERSION: '{{.SPARK_VERSION | default "3.5.5"}}'
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "spark-history-server"}}'
      PORT: '{{.PORT | default "18080"}}'
      EVENT_DIR: '{{.EVENT_DIR | default "examples/basic"}}'
    cmds:
      - ./start_local_spark_history.sh --spark-version={{.SPARK_VERSION}} --container-name={{.CONTAINER_NAME}} --port={{.PORT}} --event-dir={{.EVENT_DIR}}
      - task: wait-for-spark
        vars:
          PORT: '{{.PORT}}'
      - echo "🔥 Spark History Server started!"

  start-spark-bg:
    desc: Start local Spark History Server in background
    run: always
    vars:
      SPARK_VERSION: '{{.SPARK_VERSION | default "3.5.5"}}'
      CONTAINER_NAME: '{{.CONTAINER_NAME | default "spark-history-server"}}'
      PORT: '{{.PORT | default "18080"}}'
      EVENT_DIR: '{{.EVENT_DIR | default "examples/basic"}}'
    cmds:
      - |
        echo "Starting Spark History Server in background..."
        nohup ./start_local_spark_history.sh --spark-version={{.SPARK_VERSION}} --container-name={{.CONTAINER_NAME}} --port={{.PORT}} --event-dir={{.EVENT_DIR}} > {{.CONTAINER_NAME}}.log 2>&1 &
      - task: wait-for-spark
        vars:
          PORT: '{{.PORT}}'

  start-mcp:
    desc: Start MCP server
    interactive: true
    deps: [check-uv]
    cmds:
      - "{{.UV}} run -m spark_history_mcp.core.main --frozen"
      - task: wait-for-mcp

  start-mcp-bg:
    desc: Start MCP server in background
    deps: [check-uv]
    cmds:
      - |
        echo "Starting MCP server in background..."
        {{if .CONFIG}}export SHS_MCP_CONFIG="{{.CONFIG}}"; {{end}}bash -c 'nohup {{.UV}} run -m spark_history_mcp.core.main > mcp-server.log 2>&1 &'

      - task: wait-for-mcp
    status:
      - pgrep -f "spark_history_mcp.core.main" > /dev/null

  start-inspector:
    desc: Start MCP Inspector for testing
    interactive: true
    cmds:
      - echo "Starting MCP Inspector at http://localhost:6274"
      - echo "Press Ctrl+C to stop the inspector"
      - npx --yes @modelcontextprotocol/inspector

  start-inspector-bg:
    desc: Start MCP Inspector in background
    cmds:
      - |
        echo "Starting MCP Inspector in background..."
        nohup npx --yes @modelcontextprotocol/inspector 2>&1 | tee inspector.log &
        sleep 5
        echo "✅ MCP Inspector started at http://localhost:6274"

  dev-all:
    desc: Start all development services and prepare for testing
    cmds:
      - task: start-spark-bg
      - task: start-mcp-bg
      - sleep 1
      - |
        echo ""
        echo "🎉 All services are running!"
        echo ""
        echo "🌐 Spark History Server: http://localhost:18080"
        echo "🚀 MCP Server: http://localhost:18888"
        echo ""
        echo "Next steps:"
        echo "  • Run: task start-inspector (foreground, press Ctrl+C to stop)"
        echo "  • Or: task start-inspector-bg (background)"
        echo "  • Then open: http://localhost:6274"
        echo ""
        echo "To stop all services: task stop-all"
        echo ""

  stop-all:
    desc: Stop all background services
    cmds:
      - |
        echo "Stopping all services..."
        pkill -f "start_local_spark_history.sh" || true
        pkill -f "spark_history_mcp.core.main" || true
        pkill -f "inspector" || true
        docker stop $(docker ps -q --filter "label=mcp-spark-test=true") 2>/dev/null || true
        sleep 1
        echo "✅ All services stopped!"

  dev-setup:
    desc: Complete development environment setup
    cmds:
      - task: install
      - task: pre-commit-install
      - echo "🎉 Development environment ready!"

  generate-client:
    desc: Generate Python client from OpenAPI spec
    cmds:
      - |
        echo "🔄 Generating Python client from openapi.yaml..."
        npx --yes @openapitools/openapi-generator-cli@2.31.0 --openapitools openapi/openapitools.json generate \
          -g python \
          -i openapi/spark-history-server.yaml \
          -o src \
          --package-name spark_history_mcp.api_client \
          --additional-properties=generateSourceCodeOnly=true
        echo "✅ Client generated at src/spark_history_mcp/api_client/"

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.PROJECT_NAME}}:latest --load  .
      - echo "🐳 Docker image built!"

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 18888:18888 {{.PROJECT_NAME}}:latest
      - echo "🐳 Docker container started!"

  wait-for-spark:
    desc: Checks if Spark History Server is running
    internal: true
    run: always
    vars:
      PORT: '{{.PORT | default "18080"}}'
    cmds:
      - |
        echo "Checking if Spark History Server is running on PORT {{.PORT}}..."
        max_attempts=30
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -s --connect-timeout 1 http://localhost:{{.PORT}} > /dev/null; then
            echo "✅ Spark History Server is available on PORT {{.PORT}}"
            exit 0
          fi
          echo "Waiting for Spark History Server... ($attempt/$max_attempts)"
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "❌ Timed out waiting for Spark History Server after 60 seconds"
        exit 1

  wait-for-mcp:
    desc: Checks if MCP Server is running
    internal: true
    cmds:
      - |
        echo "Checking if MCP Server is running..."
        max_attempts=30
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -s --connect-timeout 1 http://localhost:18888 > /dev/null; then
            echo "✅ MCP Server is available on PORT 18888"
            exit 0
          fi
          echo "Waiting for MCP Server... ($attempt/$max_attempts)"
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "❌ Timed out waiting for MCP Server after 60 seconds"
        exit 1
